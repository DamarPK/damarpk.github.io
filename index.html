<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name | Professional Links</title>
    <!-- Menggunakan font modern Plus Jakarta Sans ala tech startup -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            --text-main: #1a1d24;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(255, 255, 255, 0.6);
            --button-bg: #FFFFFF;
            --button-hover: #1a1d24;
            --button-hover-text: #FFFFFF;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 16px -8px rgba(0, 0, 0, 0.05);
        }

        /* Mode Gelap otomatis jika device user menggunakan Dark Mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient: linear-gradient(135deg, #0f1115 0%, #1a1d24 100%);
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --card-bg: rgba(26, 29, 36, 0.7);
                --card-border: rgba(255, 255, 255, 0.05);
                --button-bg: #242933;
                --button-hover: #ffffff;
                --button-hover-text: #0f1115;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* Container Utama dengan efek Glassmorphism */
        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow-md);
            text-align: center;
        }

        /* Bagian Profil */
        .profile {
            margin-bottom: 2.5rem;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            border: 3px solid var(--button-bg);
            box-shadow: var(--shadow-sm);
        }

        .name {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.25rem;
        }

        .tagline {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 400;
            line-height: 1.5;
        }

        /* Badge Status Kerja / Open to Work */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            padding: 0.35rem 0.75rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 0.75rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        /* Wrapper untuk Link */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Desain Button Utama */
        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-main);
            background: var(--button-bg);
            padding: 1.1rem 1.5rem;
            border-radius: 16px;
            font-weight: 500;
            font-size: 1rem;
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow-sm);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .link-item:hover {
            background: var(--button-hover);
            color: var(--button-hover-text);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.15);
        }

        /* Highlight khusus untuk link prioritas (misal: Portfolio) */
        .featured {
            background: var(--text-main);
            color: var(--button-bg);
        }
        .featured:hover {
            opacity: 0.9;
            background: var(--text-main);
            color: var(--button-bg);
        }

        /* Footer Kredensial */
        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Bagian Atas / Profil -->
        <div class="profile">
            <!-- Ganti URL gambar di bawah dengan foto kamu sendiri -->
            <img class="avatar" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=256&q=80" alt="Foto Profil">
            <h1 class="name">Nama Kamu</h1>
            <p class="tagline">UI/UX Designer & Content Creator.<br>Building clean digital experiences.</p>
            
            <div class="status-badge">
                <span class="status-dot"></span>
                Available for Projects
            </div>
        </div>

        <!-- Daftar Link Utama -->
        <div class="links-wrapper">
            <!-- Link Utama / Highlight (Portfolio) -->
            <a href="https://portfolio-kamu.com" class="link-item featured" target="_blank" rel="noopener">
                ✨ Read My Portfolio
            </a>

            <a href="https://linkedin.com/in/username" class="link-item" target="_blank" rel="noopener">
                Connect on LinkedIn
            </a>

            <a href="https://github.com/username" class="link-item" target="_blank" rel="noopener">
                GitHub Repository
            </a>

            <a href="mailto:emailkamu@gmail.com" class="link-item" target="_blank" rel="noopener">
                Drop an Email
            </a>
        </div>

        <!-- Footer minimalis -->
        <div class="footer">
            © 2026 Nama Kamu. All rights reserved.
        </div>
    </div>

</body>
          </html>
